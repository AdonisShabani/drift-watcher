# Sample baseline configuration for testing.
# This represents the "expected" state of infrastructure.
# Built in Phase 1.

deployments:
  nginx:
    replicas: 3
    image: "nginx:1.25"
    cpu_limit: "500m"
    memory_limit: "256Mi"

configmaps:
  app-config:
    LOG_LEVEL: "info"
    DATABASE_URL: "postgres://db:5432/app"

services:
  web:
    type: "ClusterIP"
    port: 80
    target_port: 8080
